<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaptureByHS Photography</title>
  <style>
    /* Reset & base styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }

    /* Container */
    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    /* Header & Navigation */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #ccc;
    }

    header h1 { font-size: 2rem; color: #222; }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    nav ul li {
      cursor: pointer;
      transition: color 0.3s;
    }

    nav ul li:hover { color: #007bff; }

    /* Hamburger menu for mobile */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
    }

    .hamburger div {
      width: 25px;
      height: 3px;
      background-color: #333;
      margin: 4px 0;
    }

    /* Hero section */
    .hero {
      margin: 40px 0;
      text-align: center;
    }

    .hero img {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      border-radius: 10px;
    }

    .hero h2 { margin-top: 20px; font-size: 2rem; }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin: 40px 0;
    }

    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px 0;
      border-top: 1px solid #ccc;
      margin-top: 40px;
    }

    /* Media Queries for Tablet */
    @media (max-width: 1024px) {
      header h1 { font-size: 1.8rem; }
      .hero h2 { font-size: 1.5rem; }
    }

    /* Media Queries for Mobile */
    @media (max-width: 767px) {
      nav ul { display: none; }
      .hamburger { display: flex; }
    }

  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1>CaptureByHS</h1>
      <nav>
        <ul>
          <li>Home</li>
          <li>Gallery</li>
          <li>About</li>
          <li>Contact</li>
        </ul>
      </nav>
      <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
      </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
      <img src="https://via.placeholder.com/1200x500" alt="Photography Showcase">
      <h2>Capturing Moments, Creating Memories</h2>
    </section>

    <!-- Gallery -->
    <section class="gallery">
      <img src="https://via.placeholder.com/400x400" alt="Gallery Image 1">
      <img src="https://via.placeholder.com/400x400" alt="Gallery Image 2">
      <img src="https://via.placeholder.com/400x400" alt="Gallery Image 3">
      <img src="https://via.placeholder.com/400x400" alt="Gallery Image 4">
      <img src="https://via.placeholder.com/400x400" alt="Gallery Image 5">
      <img src="https://via.placeholder.com/400x400" alt="Gallery Image 6">
    </section>

    <!-- Footer -->
    <footer>
      &copy; 2026 CaptureByHS. All rights reserved.
    </footer>
  </div>

  <script>
    function toggleMenu() {
      const nav = document.querySelector('nav ul');
      nav.style.display = nav.style.display === 'flex' ? 'none' : 'flex';
      nav.style.flexDirection = 'column';
      nav.style.gap = '10px';
      nav.style.background = '#f5f5f5';
      nav.style.padding = '10px';
      nav.style.borderRadius = '5px';
    }
  </script>
</body>
</html>
